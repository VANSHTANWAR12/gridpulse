services:
  - type: web
    name: gridpulse-backend
    runtime: python
    buildCommand: pip install -r requirements-production.txt
    startCommand: python run_server.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: GEMINI_API_KEY
        sync: false
      - key: SERVE_STATIC_ROOT
        value: "false"
    plan: free
